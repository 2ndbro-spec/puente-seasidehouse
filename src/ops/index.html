<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PUENTE — スタッフ用ポータル</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ocean: #2E8CB8;
  --teal:  #36B5A0;
  --deep:  #1A5276;
  --bg:    #F0F4F8;
  --white: #ffffff;
  --text:  #2D3748;
  --muted: #718096;
  --border:#E2E8F0;
  --radius:16px;
}
body {
  font-family: -apple-system, 'Helvetica Neue', 'Noto Sans JP', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ヘッダー */
.header {
  background: linear-gradient(135deg, var(--deep) 0%, var(--ocean) 100%);
  padding: 2.5rem 1.5rem 2rem;
  text-align: center;
  color: white;
}
.header-logo {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: 6px;
  margin-bottom: 0.3rem;
}
.header-sub {
  font-size: 0.78rem;
  opacity: 0.7;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.header-badge {
  display: inline-block;
  margin-top: 0.75rem;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 99px;
  padding: 0.25rem 0.85rem;
  font-size: 0.72rem;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.9);
}

/* カードグリッド */
.cards {
  padding: 1.5rem 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  flex: 1;
}

.nav-card {
  display: block;
  background: white;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  text-decoration: none;
  color: var(--text);
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-card:active {
  transform: scale(0.98);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.nav-card-inner {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.1rem 1.1rem;
}

.nav-card-icon {
  flex-shrink: 0;
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
}

.nav-card-body { flex: 1; min-width: 0; }
.nav-card-title {
  font-size: 1rem;
  font-weight: 800;
  margin-bottom: 0.2rem;
  line-height: 1.3;
}
.nav-card-desc {
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.5;
}

.nav-card-arrow {
  flex-shrink: 0;
  font-size: 1.1rem;
  color: var(--border);
}

/* カードごとのアクセントカラー */
.card-manual   .nav-card-icon { background: #EBF8FF; }
.card-flow     .nav-card-icon { background: #E6FFFA; }
.card-todo     .nav-card-icon { background: #FFF5F5; }

.card-manual   { border-top: 3px solid var(--ocean); }
.card-flow     { border-top: 3px solid var(--teal);  }
.card-todo     { border-top: 3px solid #FC8181;      }

/* 区切りタグ */
.section-label {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 0 0.25rem;
  margin-bottom: -0.25rem;
}

/* フッター */
.footer {
  text-align: center;
  font-size: 0.68rem;
  color: var(--muted);
  padding: 1.25rem 1rem 2rem;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">PUENTE</div>
  <div class="header-sub">Staff Portal</div>
  <div class="header-badge">🔒 スタッフ専用</div>
</div>

<div class="cards">

  <div class="section-label">ドキュメント</div>

  <a class="nav-card card-manual" href="/STAFF_MANUAL.html">
    <div class="nav-card-inner">
      <div class="nav-card-icon">📋</div>
      <div class="nav-card-body">
        <div class="nav-card-title">スタッフマニュアル</div>
        <div class="nav-card-desc">ログイン・予約一覧・残枠調整・チェックイン手順</div>
      </div>
      <div class="nav-card-arrow">›</div>
    </div>
  </a>

  <a class="nav-card card-flow" href="/RESERVATION_FLOW.html">
    <div class="nav-card-inner">
      <div class="nav-card-icon">🔄</div>
      <div class="nav-card-body">
        <div class="nav-card-title">予約フロー図</div>
        <div class="nav-card-desc">本予約・仮予約・ステータス遷移・通知タイミング</div>
      </div>
      <div class="nav-card-arrow">›</div>
    </div>
  </a>

  <a class="nav-card card-todo" href="/LAUNCH_TODO.html">
    <div class="nav-card-inner">
      <div class="nav-card-icon">✅</div>
      <div class="nav-card-body">
        <div class="nav-card-title">公開前チェックリスト</div>
        <div class="nav-card-desc">仮データ・未設定項目の確認・進捗管理</div>
      </div>
      <div class="nav-card-arrow">›</div>
    </div>
  </a>

  <div class="section-label" style="margin-top:0.5rem;">管理画面</div>

  <a class="nav-card" href="/staff.html" style="border-top: 3px solid var(--deep);">
    <div class="nav-card-inner">
      <div class="nav-card-icon" style="background:#EDF2F7;">🏠</div>
      <div class="nav-card-body">
        <div class="nav-card-title">スタッフ管理画面</div>
        <div class="nav-card-desc">予約確認・チェックイン・残枠調整（要パスワード）</div>
      </div>
      <div class="nav-card-arrow">›</div>
    </div>
  </a>

</div>

<div class="footer">
  PUENTE seaside house — 逗子海岸 2026
</div>

</body>
</html>
