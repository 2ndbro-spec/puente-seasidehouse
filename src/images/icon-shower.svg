<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- アーム: 右上から接続点(42,56)へ滑らかなカーブ -->
  <path d="M 82 8 C 82 35 55 43 42 56"
        stroke="#3D4852" stroke-width="11" fill="none"
        stroke-linecap="round"/>

  <!-- シャワーヘッド: translate(32,66) rotate(-45)
       接続端(x=+14) → スクリーン(42,56) = アーム末端
       噴出面(x=-16) → スクリーン(21,77)
       高さ26px = アーム径(11)の約2.4倍で明確に区別 -->
  <g transform="translate(32,66) rotate(-45)">
    <rect x="-16" y="-13" width="30" height="26" rx="7" fill="#3D4852"/>
    <rect x="-16" y="-13" width="12" height="26" rx="7" fill="#3B82F6"/>
  </g>

  <!-- 水滴: ノズル面(21,77)の下へファン状 (全て cy > 77) -->
  <circle cx="8"  cy="86" r="3.2" fill="#3B82F6"/>
  <circle cx="15" cy="83" r="3.2" fill="#3B82F6"/>
  <circle cx="22" cy="81" r="3.2" fill="#3B82F6"/>
  <circle cx="29" cy="84" r="3.2" fill="#3B82F6"/>
  <circle cx="36" cy="82" r="3.2" fill="#3B82F6"/>
  <circle cx="5"  cy="93" r="3.2" fill="#3B82F6"/>
  <circle cx="13" cy="95" r="3.2" fill="#3B82F6"/>
  <circle cx="21" cy="94" r="3.2" fill="#3B82F6"/>
  <circle cx="30" cy="92" r="3.2" fill="#3B82F6"/>
</svg>
