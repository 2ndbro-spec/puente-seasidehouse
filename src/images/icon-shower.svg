<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- パイプアーム：上右から下へ、左にフック -->
  <path d="M 82 8 L 82 48 Q 82 68 60 68 Q 46 68 42 56"
        stroke="#3D4852" stroke-width="12" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- シャワーヘッド本体：-45度回転、x負方向（左下）が噴出面 -->
  <g transform="translate(30,68) rotate(-45)">
    <!-- 本体（濃いグレー） -->
    <rect x="-18" y="-9" width="34" height="18" rx="5" fill="#3D4852"/>
    <!-- ブルーの噴出面：x負端（左下方向） -->
    <rect x="-18" y="-9" width="11" height="18" rx="5" fill="#3B82F6"/>
  </g>

  <!-- 水滴：噴出面（左下方向）へファン状に拡散 -->
  <circle cx="16" cy="75" r="3.2" fill="#3B82F6"/>
  <circle cx="8"  cy="80" r="3.2" fill="#3B82F6"/>
  <circle cx="12" cy="68" r="3.2" fill="#3B82F6"/>
  <circle cx="3"  cy="87" r="3.2" fill="#3B82F6"/>
  <circle cx="18" cy="86" r="3.2" fill="#3B82F6"/>
  <circle cx="6"  cy="72" r="3.2" fill="#3B82F6"/>
  <circle cx="24" cy="78" r="3.2" fill="#3B82F6"/>
  <circle cx="10" cy="92" r="3.2" fill="#3B82F6"/>
  <circle cx="22" cy="93" r="3.2" fill="#3B82F6"/>
</svg>
